- name: Playbook control through ansible facts
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx if redhat os
    ansible.builtin.dnf:
      name: nginx
      state: installed
      enabled: yes
    when: ansible_os_family == "RedHat"

  - name: install nginx if debian os
    ansible.builtin.dnf:
      name: nginx
      state: present
    when: ansible_os_family == "Debian"