- name: Install Packages
  hosts: frontend
  become: yes
  tasks:
  - name: Installing the packages in loop
    ansible.builtin.package:
      name: "{{ item.name }}" #Here it takes name from the loop
      state: "{{ item.state }}" #It takes state from the loop
    loop:
    - { name: 'mysql', state: 'present'}
    - { name: 'nginx', state: 'absent'}
    - { name: 'nodejs', state: 'absent'}