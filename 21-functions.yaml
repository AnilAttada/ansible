- name: Functions converting string into list
  hosts: local
  connection: local
  vars:
    persons: "Anil, kumar, Naidu"
  tasks:
  - name: Print undefined variable
    ansible.builtin.debug:
      msg: "Hello, {{ person | default('Attada') }}"
  - name: Print names
    ansible.builtin.debug:
      msg: "This is {{ persons | split(',')}}" #The output will be changed and comes as list in between [].

  - name: convert map into list
    vars:
      Course:
        name: AWS
        Duration: 10 hrs
        Trainer: self
    ansible.builtin.debug:
      msg: Course info:{{ Course | dict2items }}"