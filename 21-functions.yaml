- name: Functions converting string into list #Functions are default, We cannot create. If we want to create own function we have to write a pythin code.
  hosts: local
  connection: local
  vars:
    persons: "Anil, kumar, Naidu"
  tasks:
  - name: Print undefined variable
    ansible.builtin.debug:
      msg: "Hello, {{ person | default('Attada') }}"
  - name: Print names
    ansible.builtin.debug:
      msg: "This is {{ persons | split(',')}}" #The output will be changed and comes as list in between [].

  - name: convert map into list
    vars:
      Course:
        name: AWS
        Duration: 10 hrs
        Trainer: self
    ansible.builtin.debug:
      msg: Course info:{{ Course | dict2items }}" #dict2items is the function

  - name: Given IP address is valid or not
    vars:
      IP: "300.34.56.78"
    ansible.builtin.debug:
      msg: "{{ IP | ansible.utils.ipaddr }}"